name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=${VERSION#v}" >> $GITHUB_OUTPUT
      
      - name: Generate Release Notes
        id: notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## 📦 ROCm Whisper API Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 🚀 Installation" >> $GITHUB_OUTPUT
          echo "\`\`\`bash" >> $GITHUB_OUTPUT
          echo "git clone https://github.com/${{ github.repository }}.git" >> $GITHUB_OUTPUT
          echo "cd rocm-whisper-api" >> $GITHUB_OUTPUT
          echo "git checkout ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "pip install -r app/requirements.txt" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📋 What's New" >> $GITHUB_OUTPUT
          echo "Check the [commits](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.VERSION }}) for details." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 🐳 Docker" >> $GITHUB_OUTPUT
          echo "Pull the latest image with:" >> $GITHUB_OUTPUT
          echo "\`\`\`bash" >> $GITHUB_OUTPUT
          echo "docker-compose up -d" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify
        run: |
          echo "✅ Release ${{ steps.version.outputs.VERSION }} created successfully!"
          echo "📍 https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}"
